apiVersion: apps/v1
kind: Deployment
metadata:
  name: corporatecompany-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: corporatecompany
  template:
    metadata:
      labels:
        app: corporatecompany
    spec:
      containers:
      - name: corporatecompany
        image: abhilash0007/corporatecompany:latest
        ports:
        - containerPort: 8086