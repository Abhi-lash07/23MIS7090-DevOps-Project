<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>ABC Technologies | Contact Us</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header>
  <a href="index.html" class="logo">ABC <span>Technologies</span></a>
  <nav>
    <ul>
      <li><a th:href="@{/}">Home</a></li>
      <li><a th:href="@{/about}">About Us</a></li>
      <li><a th:href="@{/services}">Services</a></li>
      <li><a th:href="@{/careers}">Careers</a></li>
      <li><a th:href="@{/gallery}">Gallery</a></li>
      <li><a th:href="@{/contact}">Contact Us</a></li>
    </ul>
  </nav>
</header>

<main>
  <h2 class="section-title">Contact Us</h2>
  <form id="contact-form">
    <label for="name">Name</label>
    <input type="text" id="name" required>

    <label for="email">Email</label>
    <input type="email" id="email" required>

    <label for="message">Message</label>
    <textarea id="message" rows="5" required></textarea>

    <button type="submit" class="btn">Send Message</button>
  </form>
</main>

<footer>
  &copy; 2026 ABC Technologies. All rights reserved.
</footer>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
